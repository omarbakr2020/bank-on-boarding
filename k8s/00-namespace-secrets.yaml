---
# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: bankonboard
  labels:
    app.kubernetes.io/name: bankonboard
    environment: production

---
# ── Secret (populated by Azure Key Vault CSI driver in prod) ─
# For local/CI use, apply with:
#   kubectl create secret generic bankonboard-secrets -n bankonboard \
#     --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: bankonboard-secrets
  namespace: bankonboard
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  SERVICE_API_KEY: "REPLACE_WITH_REAL_KEY"
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY"
  DATABASE_URL: "postgresql://bankonboard:REPLACE_PASSWORD@postgres-service:5432/bankonboard"
  REDIS_URL: "redis://redis-service:6379"

---
# ── ConfigMap — non-sensitive config ─────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: bankonboard-config
  namespace: bankonboard
data:
  JWT_ISSUER: "https://bankonboard.io"
  JWT_AUDIENCE: "bankonboard-api"
  ACCESS_TOKEN_TTL_MINUTES: "15"
  REFRESH_TOKEN_TTL_DAYS: "7"
  FRONTEND_URL: "https://bankonboard.io"
  PARTY_SERVICE_URL: "http://party-service:8000"
  AI_SERVICE_URL: "http://ai-service:8001"
  GATEWAY_URL: "http://gateway:3000"
