---
# ── AI Risk Service Deployment ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: bankonboard
  labels:
    app: ai-service
    tier: backend
spec:
  replicas: 1           # Worker is stateful — scale carefully
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      terminationGracePeriodSeconds: 60   # Allow in-flight AI calls to complete
      containers:
        - name: ai-service
          image: $(ACR_NAME)/ai-service:$(IMAGE_TAG)
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bankonboard-secrets
                  key: OPENAI_API_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bankonboard-secrets
                  key: REDIS_URL
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bankonboard-secrets
                  key: SERVICE_API_KEY
            - name: PARTY_SERVICE_URL
              value: "http://party-service:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: bankonboard
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
