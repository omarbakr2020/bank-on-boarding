server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Health check
    location /health {
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # Angular OAuth2 callback — must come BEFORE the /auth/ proxy block
    # This route belongs to Angular, not the gateway
    location = /auth/callback {
        try_files $uri /index.html;
    }

    # Proxy all other /auth/* to gateway (authorize, token, login, userinfo, etc.)
    location /auth/ {
        proxy_pass http://gateway:3000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tmApi/ {
        proxy_pass http://gateway:3000/tmApi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ {
        proxy_pass http://gateway:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Angular SPA — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
